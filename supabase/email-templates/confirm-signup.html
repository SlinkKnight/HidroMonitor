<!--
  Supabase → Authentication → Email Templates → Confirm signup
  Cole o conteúdo abaixo no editor (substitui o template padrão).
  Variáveis do Supabase disponíveis: {{ .Token }}, {{ .Email }}, {{ .SiteURL }}
-->
<div style="margin:0;padding:0;background-color:#f3f6fb;font-family:'Inter',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f6fb;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#ffffff;border-radius:20px;overflow:hidden;border:1px solid #e2e8f5;">
          <tr>
            <td style="background-color:#002953;padding:28px 32px;text-align:center;">
              <span style="font-size:20px;font-weight:700;letter-spacing:-0.01em;">
                <span style="color:#5B9BFF;">Hidro</span><span style="color:#5FD0FF;">Monitor</span>
              </span>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 32px 8px;text-align:center;">
              <h1 style="margin:0 0 8px;font-size:22px;line-height:1.3;color:#1a2333;">Confirme seu e-mail</h1>
              <p style="margin:0;font-size:14px;line-height:1.6;color:#5b6472;">
                Use o código abaixo para confirmar <strong>{{ .Email }}</strong> e concluir seu cadastro no HidroMonitor.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 32px;text-align:center;">
              <div style="display:inline-block;padding:18px 28px;border-radius:14px;background-color:#eef3fc;border:1px solid #d7e3f7;">
                <span style="font-size:34px;font-weight:700;letter-spacing:0.35em;color:#1E4FA6;font-family:'Courier New',monospace;">
                  {{ .Token }}
                </span>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 36px;text-align:center;">
              <p style="margin:0;font-size:13px;line-height:1.6;color:#8a94a3;">
                O código expira em alguns minutos. Se você não pediu esse cadastro, pode ignorar este e-mail com segurança.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;text-align:center;background-color:#f8fafd;border-top:1px solid #eef1f6;">
              <p style="margin:0;font-size:12px;color:#9aa3b2;">HidroMonitor · Hidrômetro residencial classe B</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</div>
